<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44" role="img" aria-label="RetireMint">
  <defs>
    <linearGradient id="rm-leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50e09a"/>
      <stop offset="100%" stop-color="#1a8f55"/>
    </linearGradient>
    <linearGradient id="rm-coin" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c89020"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <linearGradient id="rm-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50e09a"/>
      <stop offset="100%" stop-color="#2db87a"/>
    </linearGradient>
    <filter id="rm-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Coin (back) -->
  <circle cx="24" cy="30" r="10" fill="url(#rm-coin)" opacity="0.9"/>
  <!-- $ on coin -->
  <text x="24" y="34.5" text-anchor="middle"
        font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="11" font-weight="700"
        fill="#7a4a08">$</text>

  <!-- Mint leaf (front, overlapping coin) -->
  <ellipse cx="22" cy="19" rx="7.5" ry="12"
           transform="rotate(-12 22 19)"
           fill="url(#rm-leaf)" filter="url(#rm-glow)"/>
  <!-- Leaf vein -->
  <path d="M 20,10 Q 21,19 22,28" stroke="#0f5530" stroke-width="0.9" fill="none" opacity="0.5"/>
  <!-- Second leaf -->
  <ellipse cx="28" cy="17" rx="6" ry="9.5"
           transform="rotate(18 28 17)"
           fill="url(#rm-leaf)" opacity="0.72" filter="url(#rm-glow)"/>
  <path d="M 27,10 Q 27.5,17 28,24" stroke="#0f5530" stroke-width="0.7" fill="none" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="46" y="28"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="20"
        font-weight="700"
        fill="#e8edf5"
        letter-spacing="-0.025em">Retire</text>
  <text x="122" y="28"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="20"
        font-weight="700"
        fill="url(#rm-text)"
        letter-spacing="-0.025em">Mint</text>
</svg>
