<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 44" width="190" height="44" role="img" aria-label="Minder.ai">
  <defs>
    <linearGradient id="mi-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a0ff"/>
      <stop offset="100%" stop-color="#7b4fcf"/>
    </linearGradient>
    <linearGradient id="mi-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4a0ff"/>
      <stop offset="100%" stop-color="#9b6dff"/>
    </linearGradient>
    <filter id="mi-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Connection lines (drawn first, behind nodes) -->
  <line x1="20" y1="22" x2="7"  y2="12" stroke="#9b6dff" stroke-width="1.2" opacity="0.45"/>
  <line x1="20" y1="22" x2="33" y2="12" stroke="#9b6dff" stroke-width="1.2" opacity="0.45"/>
  <line x1="20" y1="22" x2="8"  y2="34" stroke="#9b6dff" stroke-width="1"   opacity="0.35"/>
  <line x1="20" y1="22" x2="32" y2="34" stroke="#9b6dff" stroke-width="1"   opacity="0.35"/>
  <line x1="20" y1="22" x2="20" y2="8"  stroke="#9b6dff" stroke-width="1.2" opacity="0.45"/>
  <!-- Cross-links -->
  <line x1="7"  y1="12" x2="20" y2="8"  stroke="#9b6dff" stroke-width="0.7" opacity="0.25"/>
  <line x1="33" y1="12" x2="20" y2="8"  stroke="#9b6dff" stroke-width="0.7" opacity="0.25"/>
  <line x1="7"  y1="12" x2="8"  y2="34" stroke="#9b6dff" stroke-width="0.6" opacity="0.2"/>
  <line x1="33" y1="12" x2="32" y2="34" stroke="#9b6dff" stroke-width="0.6" opacity="0.2"/>

  <!-- Satellite nodes -->
  <circle cx="20" cy="8"  r="3"   fill="#9b6dff" opacity="0.85"/>
  <circle cx="7"  cy="12" r="2.5" fill="#9b6dff" opacity="0.8"/>
  <circle cx="33" cy="12" r="2.5" fill="#9b6dff" opacity="0.8"/>
  <circle cx="8"  cy="34" r="2"   fill="#9b6dff" opacity="0.65"/>
  <circle cx="32" cy="34" r="2"   fill="#9b6dff" opacity="0.65"/>

  <!-- Central node (largest, glowing) -->
  <circle cx="20" cy="22" r="5.5" fill="url(#mi-grad)" filter="url(#mi-glow)"/>

  <!-- Wordmark -->
  <text x="46" y="28"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="20"
        font-weight="700"
        fill="#e8edf5"
        letter-spacing="-0.025em">Minder</text>
  <text x="138" y="24"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="13"
        font-weight="600"
        fill="url(#mi-text)"
        letter-spacing="-0.01em">.ai</text>
</svg>
