<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44" width="220" height="44" role="img" aria-label="Daedalus onWing">
  <defs>
    <linearGradient id="dw-wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6dbcff"/>
      <stop offset="100%" stop-color="#3d9be9"/>
    </linearGradient>
    <filter id="dw-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wing glyph: top-view Daedalus figure, 40x44 canvas centered at x=20 -->
  <!-- Left wing arc -->
  <path d="M 20,26 C 14,20 6,14 1,9 C 5,12 11,18 17,24 Z"
        fill="url(#dw-wing)" filter="url(#dw-glow)" opacity="0.95"/>
  <!-- Right wing arc -->
  <path d="M 20,26 C 26,20 34,14 39,9 C 35,12 29,18 23,24 Z"
        fill="url(#dw-wing)" filter="url(#dw-glow)" opacity="0.95"/>
  <!-- Body -->
  <rect x="18.5" y="20" width="3" height="10" rx="1.5"
        fill="url(#dw-wing)" filter="url(#dw-glow)"/>
  <!-- Head -->
  <circle cx="20" cy="18" r="3"
          fill="url(#dw-wing)" filter="url(#dw-glow)"/>
  <!-- Wing feather details (subtle lines) -->
  <line x1="20" y1="24" x2="8" y2="14" stroke="#6dbcff" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="24" x2="4" y2="11" stroke="#6dbcff" stroke-width="0.4" opacity="0.3"/>
  <line x1="20" y1="24" x2="32" y2="14" stroke="#6dbcff" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="24" x2="36" y2="11" stroke="#6dbcff" stroke-width="0.4" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="50" y="28"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="15"
        font-weight="500"
        fill="#e8edf5"
        letter-spacing="-0.02em">Daedalus</text>
  <text x="135" y="28"
        font-family="'Space Grotesk', 'Segoe UI', system-ui, sans-serif"
        font-size="15"
        font-weight="700"
        fill="#3d9be9"
        letter-spacing="-0.02em"> onWing</text>
</svg>
